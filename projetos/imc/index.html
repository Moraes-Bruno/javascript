<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Imc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
</head>

<body>
 

    <main class="mt-5 m-auto w-50 p-3 rounded-3">

        <h1 class="text-center">Calculadora de Imc</h1>

        <form>
            <div class="form-group">
                <label for="peso"class="mb-2" >Digite o seu peso</label>
                <input type="text" class="form-control" id="peso" name="peso">
            </div>
            <div class="form-group">
                <label for="altura" class="mb-2 mt-2">Digite a sua Altura</label>
                <input type="text" class="form-control" id="altura" name="altura">
                <small>Não digitar ponto ou virgula para a casa decimal</small>
            </div>
            <button id="botao" type="button" class="btn btn-primary mt-3 w-100">Enviar</button>
        </form>

        <p id="p1" class="h2 mt-3"></p>

    </main>

    <script src="js/index.js"></script>
    <script src="js/mascara.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
