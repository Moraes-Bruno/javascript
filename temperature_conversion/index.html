<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <title>Conversor de Temperatura</title>
</head>

<body>
    <h1>Conversor de Temperatura</h1>

    <label for="temp">Digite a temperatura</label>
    <input type="text" name="temp" id="temp">

    <label for="unit">Converter Para</label>
    <p><input type="radio" name="unit" id="cel" name="cel">Celsius</p>
    <p><input type="radio" name="unit" id="fh" name="fh">Fahrenheit</p>

    <button type="button" id="button">Enviar</button>

    <p id="result"></p>

    

    <script src="index.js"></script>
</body>

</html>
